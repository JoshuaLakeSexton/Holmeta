[build]
  base = "apps/web"
  command = "cd ../.. && npm ci && npm run db:migrate && npm run build:extension:zip && npm -w @holmeta/web run build"
  publish = ".next"
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/functions/assets/**"]

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_BUILD_DEBUG = "true"
  CI = ""

[[plugins]]
  package = "@netlify/plugin-nextjs"
