<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>holmeta</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="panel topbar">
        <div>
          <p class="kicker">HOLMETA</p>
          <h1 class="popup-title">SAVE. RECALL. FOLLOW UP.</h1>
        </div>
        <div class="chip-stack">
          <p id="modeChip" class="status-chip status-idle">STATUS: FREE</p>
          <p id="premiumChip" class="status-chip status-locked">PREMIUM: LOCKED</p>
        </div>
      </header>

      <section class="panel save-panel">
        <p class="kicker">QUICK SAVE</p>
        <button id="saveCurrentTab" class="primary save-button">SAVE THIS TAB</button>
        <div class="save-drafts">
          <label for="saveNoteInput" class="meta-label">WHY SAVE THIS?</label>
          <textarea id="saveNoteInput" class="input" rows="2" placeholder="Short context"></textarea>
          <label for="saveTagsInput" class="meta-label">TAGS (PREMIUM)</label>
          <input id="saveTagsInput" class="input" type="text" placeholder="client, project, topic" />
        </div>
        <div id="saveFeedback" class="small-note">STATUS: READY</div>
        <button id="undoSave" class="secondary" hidden>UNDO SAVE</button>
      </section>

      <section class="panel premium-panel" id="premiumPanel">
        <p class="kicker">PREMIUM UNLOCK</p>
        <p class="small-note" id="premiumCopy">Unlock reminders, sessions, resume queue, export, and tags.</p>
        <label for="licenseKeyInput" class="meta-label">LICENSE KEY</label>
        <input id="licenseKeyInput" class="input" type="text" placeholder="HOLMETA-XXXX-XXXX-XXXX-XXXX" />
        <div class="button-row">
          <button id="activateLicense" class="primary">ACTIVATE</button>
          <button id="refreshPremium" class="secondary">REFRESH</button>
          <button id="openSubscribe" class="secondary">UNLOCK PREMIUM</button>
        </div>
      </section>

      <section class="panel inbox-panel">
        <div class="inbox-header">
          <p class="kicker">INBOX</p>
          <button id="saveSession" class="secondary" data-premium>SAVE SESSION</button>
        </div>

        <div class="filters-grid">
          <input id="searchInput" class="input" type="search" placeholder="Search title, url, note, tags" />
          <select id="tagFilter" class="select">
            <option value="">ALL TAGS</option>
          </select>
          <label class="inline-check">
            <input id="hasReminderOnly" type="checkbox" />
            HAS REMINDER
          </label>
        </div>

        <div class="resume-head">
          <p class="meta-label">RESUME QUEUE</p>
          <div class="resume-actions">
            <button id="resumeNext" class="secondary" data-premium>OPEN NEXT</button>
            <button id="resumeClear" class="secondary" data-premium>CLEAR</button>
          </div>
        </div>
        <ul id="resumeList" class="mini-list"></ul>

        <ul id="inboxList" class="inbox-list"></ul>
      </section>

      <section class="panel action-panel" id="itemEditor" hidden>
        <p class="kicker" id="itemEditorTitle">EDIT ITEM</p>
        <input id="editNoteInput" class="input" type="text" placeholder="Note" />
        <input id="editTagsInput" class="input" type="text" placeholder="tag1, tag2" data-premium />
        <div class="button-row">
          <button id="saveItemMeta" class="primary">SAVE</button>
          <button id="cancelItemMeta" class="secondary">CLOSE</button>
        </div>
      </section>

      <section class="panel action-panel" id="reminderEditor" hidden>
        <p class="kicker" id="reminderEditorTitle">SET REMINDER</p>
        <div class="button-grid compact-grid">
          <button class="secondary" data-reminder-preset="30m">IN 30 MIN</button>
          <button class="secondary" data-reminder-preset="tomorrow">TOMORROW</button>
          <button class="secondary" data-reminder-preset="visit-domain">NEXT SITE VISIT</button>
          <button class="secondary" data-reminder-preset="visit-page">NEXT PAGE VISIT</button>
        </div>
        <label for="customReminderAt" class="meta-label">CUSTOM DATE/TIME</label>
        <input id="customReminderAt" class="input" type="datetime-local" />
        <div class="button-row">
          <button id="applyCustomReminder" class="primary" data-premium>SET CUSTOM</button>
          <button id="clearReminder" class="secondary" data-premium>CLEAR REMINDER</button>
          <button id="closeReminderEditor" class="secondary">CLOSE</button>
        </div>
      </section>

      <section class="panel sessions-panel">
        <div class="inbox-header">
          <p class="kicker">SESSIONS</p>
          <button id="copyLinkPack" class="secondary" data-premium>COPY LINK PACK</button>
        </div>
        <select id="exportSource" class="select" data-premium>
          <option value="inbox">CURRENT INBOX</option>
        </select>
        <ul id="sessionList" class="mini-list"></ul>
      </section>
    </main>

    <script src="common.js"></script>
    <script src="audio.js"></script>
    <script src="storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
