<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>holmeta options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="options-shell">
      <header class="panel header">
        <div>
          <p class="kicker">HOLMETA</p>
          <h1 class="page-title">OPTIONS CONSOLE</h1>
        </div>
        <div class="chip-stack">
          <p id="statusLine" class="status-chip status-idle">STATUS: READY</p>
          <p id="premiumStatus" class="status-chip status-locked">PREMIUM: LOCKED</p>
        </div>
      </header>

      <section class="panel">
        <p class="kicker">PREMIUM ACTIVATION</p>
        <label for="licenseKeyInput" class="meta-label">LICENSE KEY</label>
        <input id="licenseKeyInput" class="input" type="text" placeholder="HOLMETA-XXXX-XXXX-XXXX-XXXX" autocomplete="off" />
        <p id="accountStatus" class="small-note">READY.</p>
        <div class="button-grid three">
          <button id="activateLicense" class="primary">ACTIVATE</button>
          <button id="refreshEntitlement" class="secondary">REFRESH</button>
          <button id="clearLicense" class="secondary">CLEAR</button>
        </div>
        <div class="button-grid three">
          <button id="openDashboard" class="secondary">OPEN DASHBOARD</button>
          <button id="testDashboardUrl" class="secondary">TEST DASHBOARD URL</button>
          <button id="testLicenseValidation" class="secondary">TEST LICENSE VALIDATION</button>
        </div>
      </section>

      <section class="panel">
        <p class="kicker">ENDPOINTS</p>
        <div class="row-grid">
          <label for="apiBaseUrl" class="meta-label">API BASE URL</label>
          <input id="apiBaseUrl" class="input" type="text" />
          <label for="validateLicenseUrl" class="meta-label">VALIDATE LICENSE URL</label>
          <input id="validateLicenseUrl" class="input" type="text" />
          <label for="checkoutUrl" class="meta-label">CHECKOUT URL</label>
          <input id="checkoutUrl" class="input" type="text" />
          <label for="dashboardUrl" class="meta-label">DASHBOARD URL</label>
          <input id="dashboardUrl" class="input" type="text" />
        </div>
        <div class="button-grid two">
          <button id="saveEndpoints" class="primary">SAVE ENDPOINTS</button>
          <button id="openCheckout" class="secondary">OPEN CHECKOUT</button>
        </div>
      </section>

      <section class="panel">
        <p class="kicker">LIGHT DEFAULTS</p>
        <label class="inline-check">
          <input id="filterEnabled" type="checkbox" data-premium />
          FILTERS ENABLED
        </label>
        <label for="filterPreset" class="meta-label">DEFAULT MODE</label>
        <select id="filterPreset" class="select" data-premium></select>
        <label for="filterIntensity" class="meta-label">DEFAULT INTENSITY</label>
        <div class="slider-row">
          <input id="filterIntensity" class="range" type="range" min="0" max="100" step="1" data-premium />
          <span id="filterIntensityValue" class="small-note">0%</span>
        </div>
        <div class="button-grid two">
          <button id="applyFilterDefaults" class="primary" data-premium>APPLY FILTER DEFAULTS</button>
          <button id="reapplyFilterNow" class="secondary" data-premium>REAPPLY NOW</button>
        </div>
      </section>

      <section class="panel">
        <p class="kicker">WELLNESS NUDGES</p>
        <label class="inline-check">
          <input id="breaksEnabled" type="checkbox" data-premium />
          MICRO-BREAK REMINDERS
        </label>
        <label for="breakIntervalMin" class="meta-label">BREAK INTERVAL</label>
        <select id="breakIntervalMin" class="select" data-premium>
          <option value="35">35 MIN</option>
          <option value="50">50 MIN</option>
          <option value="65">65 MIN</option>
          <option value="90">90 MIN</option>
        </select>
        <label class="inline-check">
          <input id="eyeEnabled" type="checkbox" data-premium />
          20-20-20 EYE PROMPTS
        </label>
        <label for="eyeIntervalMin" class="meta-label">EYE INTERVAL</label>
        <select id="eyeIntervalMin" class="select" data-premium>
          <option value="20">20 MIN</option>
          <option value="30">30 MIN</option>
          <option value="45">45 MIN</option>
          <option value="60">60 MIN</option>
        </select>
        <div class="button-grid two">
          <button id="saveWellness" class="primary" data-premium>SAVE WELLNESS</button>
          <button id="snoozeWellness15" class="secondary" data-premium>SNOOZE 15M</button>
        </div>
      </section>

      <section class="panel">
        <p class="kicker">DATA TOOLS</p>
        <div class="button-grid three">
          <button id="exportState" class="secondary">EXPORT</button>
          <button id="importState" class="secondary">IMPORT</button>
          <button id="resetState" class="secondary">RESET</button>
        </div>
        <label for="stateBlob" class="meta-label">STATE JSON</label>
        <textarea id="stateBlob" class="input textarea" rows="7" placeholder="Paste exported state JSON here."></textarea>
      </section>
    </main>

    <script src="common.js"></script>
    <script src="audio.js"></script>
    <script src="storage.js"></script>
    <script src="options.js"></script>
  </body>
</html>
